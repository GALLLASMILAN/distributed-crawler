version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
  

  postgres:
    image: postgres:15
    ports:
      - '5432:5432'
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s  

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: scheduler
    command: node dist/index.js
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
